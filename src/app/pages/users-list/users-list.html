<div class="container">
  <h1>Listagem de Usuários</h1>

  <br>

  @if (carregando) {
    <p>Carregando a lista...</p>
  }

  @if (erro) {
    <p style="color: red;">Erro ao carregar os dados!</p>
  }

  @if (!carregando && !erro) {
    <ul>
      @for (user of usuarios; track user.id) {
        <li>
          <strong>{{ user.name }}</strong> - {{ user.email }} ({{ user.address.city }})
          <a [routerLink]="['/users', user.id]">Ver detalhes</a>
        </li>
      }
    </ul>
  }
</div>
